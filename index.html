<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BTC Overlay</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: Inter, Arial, sans-serif;
    overflow: hidden;
}

/* CONTAINER */
.container {
    position: absolute;
    top: 20px;
    left: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;

    opacity: 0;
    transform: translateX(-20px);
    transition: all 1s ease;
}

.container.visible {
    opacity: 1;
    transform: translateX(0);
}

/* BUTTON */
.btn {
    position: relative;
    display: flex;
    align-items: center;
    gap: 8px;

    padding: 8px 16px 8px 10px;

    background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
    border-radius: 14px;

    font-size: 16px;
    font-weight: 800;
    color: white;

    opacity: 0;
    transform: translateX(-20px);
    transition: all 0.8s ease;

    white-space: nowrap;
}

/* DOT BASE */
.btn::before {
    content: "";
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);

    width: 10px;
    height: 10px;

    border-radius: 50%;
    opacity: 0.9;
}

/* POSITIVE */
.btn.positive::before {
    background: linear-gradient(135deg, #40e100, #ffd000);
}

/* NEGATIVE */
.btn.negative::before {
    background: linear-gradient(135deg, #ff3b3b, #ff0000);
}

/* LABEL */
.label-box {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    padding: 2px 6px;

    font-size: 12px;
    font-weight: 700;
    opacity: 0.85;
}

/* VALUE */
.value {
    font-size: 17px;
    font-weight: 900;
}

.green { color: #40e100; }
.red { color: #ff3b3b; }

/* SHOW */
.btn.show {
    opacity: 1;
    transform: translateX(0);
}

/* HIDE */
.btn.hide {
    opacity: 0;
    transform: translateX(-140px);
    transition: all 2.5s cubic-bezier(0.22, 1, 0.36, 1);
}
</style>
</head>

<body>

<div class="container" id="container">
    <div class="btn" id="b1"></div>
    <div class="btn" id="b2"></div>
    <div class="btn" id="b3"></div>
    <div class="btn" id="b4"></div>
    <div class="btn" id="b5"></div>
    <div class="btn" id="b6"></div>
    <div class="btn" id="b7"></div>
</div>

<script>
const container = document.getElementById("container");

const buttons = [
    document.getElementById("b1"),
    document.getElementById("b2"),
    document.getElementById("b3"),
    document.getElementById("b4"),
    document.getElementById("b5"),
    document.getElementById("b6"),
    document.getElementById("b7")
];

const periods = [
    {h: 6, label: "6H"},
    {h: 12, label: "12H"},
    {h: 24, label: "24H"},
    {h: 48, label: "48H"},
    {h: 72, label: "72H"},
    {h: 168, label: "1W"},
    {h: 720, label: "1M"},
];

// --- FETCH ---
async function fetchData() {
    const [priceRes, klinesRes] = await Promise.all([
        fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT"),
        fetch("https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1h&limit=720")
    ]);

    const priceData = await priceRes.json();
    const klinesData = await klinesRes.json();

    return {
        current: parseFloat(priceData.price),
        klines: klinesData
    };
}

// --- UPDATE ---
async function updateData() {
    const data = await fetchData();
    const current = data.current;
    const klines = data.klines;

    let maxWidth = 0;

    for (let i = 0; i < periods.length; i++) {
        const p = periods[i];

        const index = klines.length - p.h;
        const past = parseFloat(klines[index][4]); // CLOSE

        const change = ((current - past) / past) * 100;
        const positive = change >= 0;

        // DOT COLOR
        buttons[i].classList.remove("positive", "negative");
        buttons[i].classList.add(positive ? "positive" : "negative");

        buttons[i].innerHTML = `
            <div class="label-box">${p.label}</div>
            <div class="value ${positive ? 'green' : 'red'}">
                ${positive ? '+' : ''}${change.toFixed(2)}%
            </div>
        `;
    }

    // equal width
    buttons.forEach(btn => btn.style.width = "auto");

    buttons.forEach(btn => {
        maxWidth = Math.max(maxWidth, btn.offsetWidth);
    });

    buttons.forEach(btn => {
        btn.style.width = maxWidth + "px";
    });
}

// --- SHOW ---
function showSequence() {
    container.classList.add("visible");

    buttons.forEach((btn, i) => {
        setTimeout(() => btn.classList.add("show"), i * 150);
    });
}

// --- HIDE ---
function hideSequence() {
    [...buttons].reverse().forEach((btn, i) => {
        setTimeout(() => btn.classList.add("hide"), i * 180);
    });

    setTimeout(() => {
        container.classList.remove("visible");
        buttons.forEach(btn => btn.classList.remove("show", "hide"));
    }, 2600);
}

// --- LOOP ---
async function loop() {
    while (true) {
        await updateData();

        showSequence();
        await sleep(30000);

        hideSequence();
        await sleep(90000); // total cycle = 120s
    }
}

function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
}

loop();
</script>

</body>
</html>
