<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BTC Overlay</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: Inter, Arial, sans-serif;
    overflow: hidden;
}

/* CONTAINER */
.container {
    position: absolute;
    top: 20px;
    left: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;

    opacity: 0;
    transform: translateX(-20px);
    transition: all 1s ease;
}

.container.visible {
    opacity: 1;
    transform: translateX(0);
}

/* BUTTON */
.btn {
    position: relative;
    display: flex;
    align-items: center;
    gap: 12px;

    padding: 10px 55px 10px 12px;

    background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
    border-radius: 16px;

    font-size: 17px;
    font-weight: 700;
    color: white;

    opacity: 0;
    transform: translateX(-20px);
    transition: all 0.8s ease;

    white-space: nowrap;
}

/* RIGHT ARROW */
.btn::after {
    content: "";
    position: absolute;
    right: 0;
    top: 0;
    width: 65px;
    height: 100%;

    background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
    clip-path: polygon(0 0, 100% 50%, 0 100%);
}

/* INNER ACCENT */
.btn::before {
    content: "";
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 34px;
    height: 34px;

    background: linear-gradient(135deg, #40e100, #ffd000);
    clip-path: polygon(0 0, 100% 50%, 0 100%);
    opacity: 0.85;
}

/* LABEL BOX */
.label-box {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 3px 8px;

    font-size: 13px;
    font-weight: 700;
    opacity: 0.85;
}

/* VALUE */
.value {
    font-size: 18px;
    font-weight: 800;
}

/* COLORS */
.green { color: #40e100; }
.red { color: #ff0000; }

/* SHOW */
.btn.show {
    opacity: 1;
    transform: translateX(0);
}

/* HIDE */
.btn.hide {
    opacity: 0;
    transform: translateX(-180px);
    transition: all 3s cubic-bezier(0.22, 1, 0.36, 1);
}
</style>
</head>

<body>

<div class="container" id="container">
    <div class="btn" id="b1"></div>
    <div class="btn" id="b2"></div>
    <div class="btn" id="b3"></div>
    <div class="btn" id="b4"></div>
    <div class="btn" id="b5"></div>
    <div class="btn" id="b6"></div>
    <div class="btn" id="b7"></div>
</div>

<script>
const container = document.getElementById("container");

const buttons = [b1, b2, b3, b4, b5, b6, b7];

const periods = [
    {h: 6, label: "6H"},
    {h: 12, label: "12H"},
    {h: 24, label: "24H"},
    {h: 48, label: "48H"},
    {h: 72, label: "72H"},
    {h: 168, label: "1W"},
    {h: 720, label: "1M"},
];

// --- FETCH BTC ---
async function getCurrentPrice() {
    const r = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT");
    const d = await r.json();
    return parseFloat(d.price);
}

async function getPastPrice(h) {
    const now = Date.now();
    const past = now - h * 3600000;

    const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1h&startTime=${past}&limit=1`);
    const d = await r.json();
    return parseFloat(d[0][1]);
}

// --- UPDATE ---
async function updateData() {
    const current = await getCurrentPrice();
    let maxWidth = 0;

    for (let i = 0; i < periods.length; i++) {
        const p = periods[i];
        const past = await getPastPrice(p.h);

        const change = ((current - past) / past) * 100;
        const positive = change >= 0;

        buttons[i].innerHTML = `
            <div class="label-box">${p.label}</div>
            <div class="value ${positive ? 'green' : 'red'}">
                ${positive ? '+' : ''}${change.toFixed(2)}%
            </div>
        `;
    }

    // equal width
    buttons.forEach(btn => btn.style.width = "auto");

    buttons.forEach(btn => {
        maxWidth = Math.max(maxWidth, btn.offsetWidth);
    });

    buttons.forEach(btn => {
        btn.style.width = maxWidth + "px";
    });
}

// --- SHOW ---
function showSequence() {
    container.classList.add("visible");

    buttons.forEach((btn, i) => {
        setTimeout(() => btn.classList.add("show"), i * 180);
    });
}

// --- HIDE ---
function hideSequence() {
    [...buttons].reverse().forEach((btn, i) => {
        setTimeout(() => btn.classList.add("hide"), i * 200);
    });

    setTimeout(() => {
        container.classList.remove("visible");
        buttons.forEach(btn => btn.classList.remove("show", "hide"));
    }, 3200);
}

// --- LOOP ---
async function loop() {
    while (true) {
        await updateData();

        showSequence();
        await sleep(30000);

        hideSequence();
        await sleep(60000);
    }
}

function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
}

loop();
</script>

</body>
</html>
